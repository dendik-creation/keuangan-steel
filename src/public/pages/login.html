<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aplikasi Manajemen Keuangan</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 class="logo">Keuangan</h1>
      <ul class="nav-menu">
        <li><a href="./login.html">Login</a></li>
        <li><a href="./register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="container auth-container">
    <div class="auth-box">
      <h2>Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <p class="auth-link">Belum punya akun? <a href="./register.html">Register di sini</a></p>
      <div id="error-message" class="error-message"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Aplikasi Manajemen Keuangan Pribadi. All rights reserved.</p>
    </div>
  </footer>

  <script src="../scripts/auth.js"></script>
</body>
</html>
